<html lang="en">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Journal - Desert Mountain Healing IOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 900px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            padding: 2rem;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        
        .header {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            padding-bottom: 1.5rem;
            border-bottom: 2px solid #E5E7EB;
        }
        
        .back-btn {
            background: linear-gradient(135deg, #4A9FBF 0%, #2D7EA0 100%);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .back-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 159, 191, 0.4);
        }
        
        h1 {
            color: #1F2937;
            font-size: 2rem;
            flex: 1;
        }
        
        h1 i {
            color: #4A9FBF;
            margin-right: 0.5rem;
        }
        
        .journal-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }
        
        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        label {
            font-weight: 600;
            color: #374151;
            font-size: 0.95rem;
        }
        
        input[type="text"],
        textarea {
            padding: 0.75rem;
            border: 2px solid #E5E7EB;
            border-radius: 10px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            transition: border-color 0.3s;
        }
        
        input[type="text"]:focus,
        textarea:focus {
            outline: none;
            border-color: #4A9FBF;
        }
        
        textarea {
            min-height: 250px;
            resize: vertical;
        }
        
        .mood-selector {
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        
        .mood-btn {
            padding: 0.75rem 1.5rem;
            border: 2px solid #E5E7EB;
            background: white;
            border-radius: 10px;
            cursor: pointer;
            font-size: 1.5rem;
            transition: all 0.3s;
        }
        
        .mood-btn:hover {
            transform: scale(1.1);
            border-color: #4A9FBF;
        }
        
        .mood-btn.selected {
            background: linear-gradient(135deg, #4A9FBF 0%, #2D7EA0 100%);
            border-color: #2D7EA0;
            transform: scale(1.1);
        }
        
        .btn-group {
            display: flex;
            gap: 1rem;
        }
        
        .btn {
            padding: 1rem 2rem;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #4A9FBF 0%, #2D7EA0 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(74, 159, 191, 0.4);
        }
        
        .btn-secondary {
            background: #F3F4F6;
            color: #374151;
        }
        
        .btn-secondary:hover {
            background: #E5E7EB;
        }
        
        .entries-section {
            margin-top: 3rem;
            padding-top: 2rem;
            border-top: 2px solid #E5E7EB;
        }
        
        .entries-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }
        
        .entry-card {
            background: #F9FAFB;
            border-radius: 10px;
            padding: 1.5rem;
            margin-bottom: 1rem;
            border-left: 4px solid #4A9FBF;
        }
        
        .entry-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }
        
        .entry-date {
            font-weight: 600;
            color: #1F2937;
        }
        
        .entry-mood {
            font-size: 1.5rem;
        }
        
        .entry-title {
            font-weight: 600;
            color: #374151;
            margin-bottom: 0.5rem;
        }
        
        .entry-content {
            color: #6B7280;
            line-height: 1.6;
        }
        
        .delete-btn {
            background: #EF4444;
            color: white;
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
        }
        
        .delete-btn:hover {
            background: #DC2626;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #9CA3AF;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
            opacity: 0.5;
        }
        
        .toast {
            position: fixed;
            top: 2rem;
            right: 2rem;
            background: linear-gradient(135deg, #10B981 0%, #059669 100%);
            color: white;
            padding: 1rem 1.5rem;
            border-radius: 10px;
            box-shadow: 0 4px 12px rgba(16, 185, 129, 0.4);
            display: none;
            align-items: center;
            gap: 0.5rem;
            z-index: 1000;
        }
        
        .toast.show {
            display: flex;
            animation: slideIn 0.3s ease;
        }
        
        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <a href="index.html" class="back-btn">
                <i class="fas fa-arrow-left"></i> Back to Portal
            </a>
            <h1><i class="fas fa-pen"></i> Digital Journal</h1>
        </div>
        
        <form id="journalForm" class="journal-form">
            <div class="form-group">
                <label>How are you feeling today?</label>
                <div class="mood-selector">
                    <button type="button" class="mood-btn" data-mood="😊" title="Happy">😊</button>
                    <button type="button" class="mood-btn" data-mood="😌" title="Calm">😌</button>
                    <button type="button" class="mood-btn" data-mood="😔" title="Sad">😔</button>
                    <button type="button" class="mood-btn" data-mood="😟" title="Anxious">😟</button>
                    <button type="button" class="mood-btn" data-mood="😤" title="Frustrated">😤</button>
                    <button type="button" class="mood-btn" data-mood="💪" title="Strong">💪</button>
                    <button type="button" class="mood-btn" data-mood="🙏" title="Grateful">🙏</button>
                </div>
            </div>
            
            <div class="form-group">
                <label for="title">Entry Title (Optional)</label>
                <input type="text" id="title" placeholder="Give your entry a title...">
            </div>
            
            <div class="form-group">
                <label for="content">What's on your mind?</label>
                <textarea id="content" placeholder="Write your thoughts, feelings, challenges, victories, or anything you'd like to remember..." required></textarea>
            </div>
            
            <div class="btn-group">
                <button type="button" class="btn btn-secondary" onclick="document.getElementById('journalForm').reset(); selectedMood = null; document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));">Clear</button>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save"></i> Save Entry
                </button>
            </div>
        </form>
        
        <div class="entries-section">
            <div class="entries-header">
                <h2>Previous Entries</h2>
                <span id="entryCount" style="color: #6B7280;">0 entries</span>
            </div>
            <div id="entriesContainer"></div>
        </div>
    </div>
    
    <div id="toast" class="toast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage"></span>
    </div>
    
    <script>
        // Initialize Supabase
        const SUPABASE_URL = 'https://qmrdlgopygylaakskpls.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFtcmRsZ29weWd5bGFha3NrcGxzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NjUyMTk3MDMsImV4cCI6MjA4MDc5NTcwM30.aYORMs31sN847fKtH103VKFd13xtRft9FFXJNlvOsZw';
        const journalSupabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
        
        // Get current user
        function getCurrentUser() {
            const session = localStorage.getItem('dmh_session');
            if (!session) return { id: 'test-user', email: 'test@test.com' }; // Demo user
            try {
                const sessionData = JSON.parse(session);
                return sessionData.user;
            } catch (error) {
                return { id: 'test-user', email: 'test@test.com' };
            }
        }
        
        const currentUser = getCurrentUser();
        
        let selectedMood = null;
        let entries = JSON.parse(localStorage.getItem('journalEntries') || '[]');
        
        // Mood selector
        document.querySelectorAll('.mood-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
                this.classList.add('selected');
                selectedMood = this.dataset.mood;
            });
        });
        
        // Form submission
        document.getElementById('journalForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            if (!selectedMood) {
                showToast('Please select a mood');
                return;
            }
            
            const entry = {
                id: Date.now(),
                date: new Date().toLocaleString(),
                mood: selectedMood,
                title: document.getElementById('title').value || 'Untitled Entry',
                content: document.getElementById('content').value
            };
            
            entries.unshift(entry);
            localStorage.setItem('journalEntries', JSON.stringify(entries));
            
            // 🎯 SAVE TO ACTIVITY FEED with daily limit check
            const result = await saveToActivityFeed(entry);
            
            // Show appropriate message based on points
            if (result.points > 0) {
                showToast(`Entry saved successfully! +${result.points} points earned 🌟 (entry ${result.count}/2 today)`);
            } else {
                showToast('Entry saved! (You\'ve reached your daily journal point limit: 2/2) 📝');
            }
            
            this.reset();
            selectedMood = null;
            document.querySelectorAll('.mood-btn').forEach(b => b.classList.remove('selected'));
            
            loadEntries();
        });
        
        // Save to activity feed with daily points limit
        async function saveToActivityFeed(entry) {
            try {
                // CHECK DAILY LIMIT: Only first 2 journal entries per day get points
                const today = new Date().toISOString().split('T')[0]; // YYYY-MM-DD
                
                console.log(`🔍 Checking if user already earned journal points today (${today})...`);
                
                // ✅ FIXED: Check journal_entries table, not activities
                const { data: todayJournals, error: checkError } = await journalSupabase
                    .from('journal_entries')
                    .select('id, created_at')
                    .eq('user_id', currentUser.id)
                    .gte('created_at', `${today}T00:00:00`)
                    .lte('created_at', `${today}T23:59:59`);
                
                if (checkError) {
                    console.error('❌ Error checking daily journal limit:', checkError);
                }
                
                const journalsToday = todayJournals ? todayJournals.length : 0;
                
                // Determine points: first 2 entries = 25 points each, subsequent = 0
                let pointsToAward = 0;
                if (journalsToday < 2) {
                    pointsToAward = 25;
                    console.log(`💰 Points to award: ${pointsToAward} (entry ${journalsToday + 1} of 2)`);
                } else {
                    pointsToAward = 0;
                    console.log(`⚠️ Daily journal limit reached (2/2). No points awarded.`);
                }
                
                console.log(`📝 Journal entries today: ${journalsToday}`);
                
                // ✅ FIXED 1: Save to journal_entries table (so portal can count it)
                const journalData = {
                    user_id: currentUser.id,
                    title: entry.title,
                    content: entry.content,
                    mood: entry.mood,
                    points: pointsToAward,
                    created_at: new Date().toISOString()
                };
                
                console.log('📝 Saving to journal_entries table:', journalData);
                
                const { data: journalInsert, error: journalError } = await journalSupabase
                    .from('journal_entries')
                    .insert([journalData])
                    .select();
                
                if (journalError) {
                    console.error('❌ Error saving to journal_entries:', journalError);
                    throw journalError;
                } else {
                    console.log('✅ Journal entry saved to journal_entries table:', journalInsert);
                }
                
                // ✅ FIXED 2: Update user_profiles points (if points awarded)
                if (pointsToAward > 0) {
                    console.log(`💰 Updating user_profiles points (+${pointsToAward})...`);
                    
                    // Get current points
                    const { data: profile, error: profileFetchError } = await journalSupabase
                        .from('user_profiles')
                        .select('points, available_points')
                        .eq('user_id', currentUser.id)
                        .maybeSingle();
                    
                    if (profileFetchError) {
                        console.error('❌ Error fetching profile:', profileFetchError);
                    } else if (profile) {
                        const newPoints = (profile.points || 0) + pointsToAward;
                        console.log(`📊 Current points: ${profile.points}, New points: ${newPoints}`);
                        
                        const { error: updateError } = await journalSupabase
                            .from('user_profiles')
                            .update({ 
                                points: newPoints,
                                available_points: newPoints
                            })
                            .eq('user_id', currentUser.id);
                        
                        if (updateError) {
                            console.error('❌ Error updating points:', updateError);
                        } else {
                            console.log(`✅ Points updated: ${profile.points} → ${newPoints}`);
                        }
                    }
                }
                
                // ✅ FIXED 3: Also save to activities table (for activity feed)
                const activityData = {
                    user_id: currentUser.id,
                    activity_type: 'journal_entry',
                    activity_title: 'Journal Entry',
                    activity_description: `Wrote journal entry: "${entry.title}"`,
                    points_earned: pointsToAward,
                    metadata: JSON.stringify({
                        mood: entry.mood,
                        title: entry.title,
                        word_count: entry.content.split(' ').length,
                        is_first_today: isFirstEntryToday
                    }),
                    created_at: new Date().toISOString()
                };
                
                console.log('📊 Saving journal activity to feed:', activityData);
                
                const { data, error } = await journalSupabase
                    .from('activities')
                    .insert([activityData])
                    .select();
                
                if (error) {
                    console.error('❌ Activity feed error:', error);
                } else {
                    console.log('✅ Journal activity saved to feed:', data);
                }
                
                // Return points and count for toast message
                return { points: pointsToAward, count: journalsToday + 1 };
                
            } catch (error) {
                console.error('❌ Error saving to activity feed:', error);
                return { points: 0, count: 0 };
            }
        }
        
        // Load entries
        function loadEntries() {
            const container = document.getElementById('entriesContainer');
            const countEl = document.getElementById('entryCount');
            
            countEl.textContent = `${entries.length} ${entries.length === 1 ? 'entry' : 'entries'}`;
            
            if (entries.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-book-open"></i>
                        <p>No journal entries yet. Start writing to track your recovery journey!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = entries.map(entry => `
                <div class="entry-card">
                    <div class="entry-header">
                        <div>
                            <div class="entry-date">${entry.date}</div>
                            <div class="entry-mood">${entry.mood}</div>
                        </div>
                        <button class="delete-btn" onclick="deleteEntry(${entry.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                    <div class="entry-title">${entry.title}</div>
                    <div class="entry-content">${entry.content}</div>
                </div>
            `).join('');
        }
        
        // Delete entry
        function deleteEntry(id) {
            if (confirm('Are you sure you want to delete this entry?')) {
                entries = entries.filter(e => e.id !== id);
                localStorage.setItem('journalEntries', JSON.stringify(entries));
                loadEntries();
                showToast('Entry deleted');
            }
        }
        
        // Toast notification
        function showToast(message) {
            const toast = document.getElementById('toast');
            const messageEl = document.getElementById('toastMessage');
            messageEl.textContent = message;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        }
        
        // Load entries on page load
        loadEntries();
    </script>
</body>
</html>
