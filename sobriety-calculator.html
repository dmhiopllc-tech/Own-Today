<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sobriety Calculator - Own Today</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="css/white-label.css">
    <link rel="stylesheet" href="css/mobile-nav.css">
    
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            padding-bottom: 80px;
        }
        .container { max-width: 800px; margin: 0 auto; }
        .page-header {
            background: white;
            border-radius: 20px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .back-button {
            background: linear-gradient(135deg, var(--org-primary, #667eea), var(--org-secondary, #764ba2));
            color: white;
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 20px;
            transition: transform 0.3s ease;
        }
        .back-button:hover { transform: scale(1.1); }
        .page-header-content h1 { color: var(--org-primary, #667eea); font-size: 32px; margin-bottom: 5px; }
        .page-header-content p { color: #666; font-size: 16px; }
        
        .calculator-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            color: #333;
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .form-group input {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--org-primary, #667eea);
        }
        .calculate-btn {
            width: 100%;
            background: linear-gradient(135deg, var(--org-primary, #667eea), var(--org-secondary, #764ba2));
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-weight: 600;
            font-size: 18px;
            cursor: pointer;
            transition: transform 0.3s ease;
        }
        .calculate-btn:hover { transform: scale(1.05); }
        
        .results {
            display: none;
            margin-top: 30px;
        }
        .results.show { display: block; }
        .result-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 15px;
            margin-bottom: 30px;
        }
        .result-box {
            background: linear-gradient(135deg, var(--org-primary, #667eea), var(--org-secondary, #764ba2));
            color: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
        }
        .result-number {
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 5px;
        }
        .result-label { font-size: 14px; opacity: 0.9; }
        
        .celebration {
            background: linear-gradient(135deg, #4caf50, #45a049);
            color: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
        }
        .celebration h2 {
            font-size: 32px;
            margin-bottom: 15px;
        }
        .celebration p {
            font-size: 18px;
            line-height: 1.6;
        }
        
        @media (max-width: 768px) {
            .result-grid { grid-template-columns: repeat(2, 1fr); }
        }
    </style>
</head>
<body>
    <div id="mobile-nav"></div>
    <div class="container">
        <div class="page-header">
            <button class="back-button" onclick="window.location.href='client-portal.html'">
                <i class="fas fa-arrow-left"></i>
            </button>
            <div class="page-header-content">
                <h1>Sobriety Calculator</h1>
                <p>Track your milestone journey</p>
            </div>
        </div>

        <div class="calculator-card">
            <div class="form-group">
                <label for="sobriety-date">
                    <i class="fas fa-calendar"></i> Your Sobriety Date
                </label>
                <input type="date" id="sobriety-date" required>
            </div>

            <button class="calculate-btn" onclick="calculate()">
                <i class="fas fa-calculator"></i> Calculate My Time
            </button>

            <div id="results" class="results">
                <div class="result-grid">
                    <div class="result-box">
                        <div class="result-number" id="years">0</div>
                        <div class="result-label">Years</div>
                    </div>
                    <div class="result-box">
                        <div class="result-number" id="months">0</div>
                        <div class="result-label">Months</div>
                    </div>
                    <div class="result-box">
                        <div class="result-number" id="days">0</div>
                        <div class="result-label">Days</div>
                    </div>
                    <div class="result-box">
                        <div class="result-number" id="hours">0</div>
                        <div class="result-label">Hours</div>
                    </div>
                </div>

                <div class="celebration">
                    <h2 id="celebration-title">🎉 Keep Going Strong!</h2>
                    <p id="celebration-message">Every moment counts on your journey to recovery.</p>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/config.js"></script>
    <script src="js/theming-engine.js"></script>
    <script src="js/mobile-nav.js"></script>
    <script>
        if (window.themingEngine) window.themingEngine.init();

        // Set max date to today
        document.getElementById('sobriety-date').max = new Date().toISOString().split('T')[0];

        function calculate() {
            const sobrietyDate = new Date(document.getElementById('sobriety-date').value);
            const now = new Date();

            if (!document.getElementById('sobriety-date').value) {
                alert('Please select your sobriety date');
                return;
            }

            if (sobrietyDate > now) {
                alert('Sobriety date cannot be in the future');
                return;
            }

            const diff = now - sobrietyDate;
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            const hours = Math.floor(diff / (1000 * 60 * 60));
            const years = Math.floor(days / 365);
            const months = Math.floor((days % 365) / 30);
            const remainingDays = days % 30;

            document.getElementById('years').textContent = years;
            document.getElementById('months').textContent = months;
            document.getElementById('days').textContent = remainingDays;
            document.getElementById('hours').textContent = hours.toLocaleString();

            let title, message;
            if (days === 0) {
                title = '🌟 Day One Begins!';
                message = 'Today is the first day of your new life. You\'ve got this!';
            } else if (days < 30) {
                title = `🔥 ${days} Days Strong!`;
                message = 'Every day is a victory. Keep up the amazing work!';
            } else if (days < 90) {
                title = `💪 ${days} Days of Strength!`;
                message = 'You\'re building incredible momentum. Stay the course!';
            } else if (days < 365) {
                title = `🏆 ${days} Days of Victory!`;
                message = 'Your commitment is inspiring. You\'re unstoppable!';
            } else {
                title = `🌟 ${years} Year${years > 1 ? 's' : ''} of Freedom!`;
                message = 'You\'re a true inspiration. Your journey gives hope to others!';
            }

            document.getElementById('celebration-title').textContent = title;
            document.getElementById('celebration-message').textContent = message;
            document.getElementById('results').classList.add('show');
        }
    </script>
</body>
</html>
