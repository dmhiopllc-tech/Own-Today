        async function init() {
            // Demo mode
            streak = 12; // Demo: 12 day streak
            completedDays = Array(12).fill().map((_, i) => {
                const d = new Date();
                d.setDate(d.getDate() - i);
                return d.toISOString().split('T')[0];
            });
            
            // Display affirmation
            getNewAffirmation();
            
            // Render categories
            renderCategories();
            
            // Render calendar
            renderCalendar();
        }
        
        async function loadUserData() {
            // Demo mode - not needed
            // Streak and completed days set in init()
                }
            } catch (error) {
                console.error('Error loading user data:', error);
            }
        }
        
        function calculateStreak(dates) {
            if (dates.length === 0) return 0;
            
            let streak = 1;
            const sortedDates = dates.sort((a, b) => new Date(b) - new Date(a));
            
            for (let i = 0; i < sortedDates.length - 1; i++) {
                const current = new Date(sortedDates[i]);
                const next = new Date(sortedDates[i + 1]);
                const diffDays = Math.floor((current - next) / (1000 * 60 * 60 * 24));
                
                if (diffDays === 1) {
                    streak++;
                } else {
                    break;
                }
            }
            
            return streak;
        }
        
        function getNewAffirmation() {
            let affirmations = [];
            
            if (selectedCategory === 'all') {
                // Get all affirmations
                Object.values(affirmationsData).forEach(cat => {
                    affirmations.push(...cat.affirmations.map(text => ({
                        text,
                        category: cat.name,
                        icon: cat.icon
                    })));
                });
            } else {
                // Get affirmations from selected category
                const cat = affirmationsData[selectedCategory];
                affirmations = cat.affirmations.map(text => ({
                    text,
                    category: cat.name,
                    icon: cat.icon
                }));
            }
            
            // Pick random affirmation
            currentAffirmation = affirmations[Math.floor(Math.random() * affirmations.length)];
            
            // Display it
            document.getElementById('affirmationText').textContent = currentAffirmation.text;
            document.getElementById('affirmationIcon').textContent = currentAffirmation.icon;
            document.getElementById('categoryText').textContent = currentAffirmation.category;
            
            // Check if favorited
            updateFavoriteButton();
        }
        
        function renderCategories() {
            const container = document.getElementById('categoriesGrid');
            
            const categories = [
                { key: 'all', icon: '✨', name: 'All', count: Object.values(affirmationsData).reduce((sum, cat) => sum + cat.affirmations.length, 0) },
                ...Object.entries(affirmationsData).map(([key, cat]) => ({
                    key,
                    icon: cat.icon,
                    name: cat.name,
                    count: cat.affirmations.length
                }))
            ];
            
            container.innerHTML = categories.map(cat => `
                <div class="category-card ${selectedCategory === cat.key ? 'active' : ''}" 
                     onclick="selectCategory('${cat.key}')">
                    <div class="category-icon">${cat.icon}</div>
                    <div class="category-name">${cat.name}</div>
                    <div class="category-count">${cat.count} affirmations</div>
                </div>
            `).join('');
        }
        
        function selectCategory(category) {
            selectedCategory = category;
            renderCategories();
            getNewAffirmation();
        }
        
        function renderCalendar() {
            const container = document.getElementById('calendarGrid');
            const today = new Date();
            const days = ['S', 'M', 'T', 'W', 'T', 'F', 'S'];
            
            let html = days.map(d => `<div class="calendar-day header">${d}</div>`).join('');
            
            // Get last 3 weeks
            for (let i = 20; i >= 0; i--) {
                const date = new Date(today);
                date.setDate(date.getDate() - i);
                const dateStr = date.toISOString().split('T')[0];
                const isToday = i === 0;
                const isCompleted = completedDays.includes(dateStr);
                
                html += `<div class="calendar-day ${isCompleted ? 'completed' : ''} ${isToday ? 'today' : ''}">
                    ${isCompleted ? '✓' : date.getDate()}
                </div>`;
            }
            
            container.innerHTML = html;
        }
        
        async function toggleFavorite() {
            if (!currentAffirmation) return;
            
            const isFavorited = favorites.some(f => f.text === currentAffirmation.text);
            
            if (isFavorited) {
                favorites = favorites.filter(f => f.text !== currentAffirmation.text);
                alert('Removed from favorites!');
            } else {
                favorites.push(currentAffirmation);
                alert('Added to favorites!');
            }
            
            updateFavoriteButton();
        }
        
        function updateFavoriteButton() {
            if (!currentAffirmation) return;
            
            const isFavorited = favorites.some(f => f.text === currentAffirmation.text);
            const icon = document.getElementById('favoriteIcon');
            const text = document.getElementById('favoriteText');
            
            if (isFavorited) {
                icon.style.color = '#EC4899';
                text.textContent = 'Saved';
            } else {
                icon.style.color = 'white';
                text.textContent = 'Save';
            }
        }
        
        async function loadFavorites() {
            // Demo mode - no favorites loaded
            favorites = [];
            }

        function renderFavorites() {
            const container = document.getElementById('favoritesGrid');
            
            if (favorites.length === 0) {
                container.innerHTML = `

                        <i class="fas fa-heart"></i>
                        <p>No saved affirmations yet. Tap the heart to save your favorites!</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = favorites.map(fav => `
                <div class="favorite-card" onclick="showAffirmation('${fav.text.replace(/'/g, "\\'")}', '${fav.category}', '${fav.icon}')">
                    <div class="favorite-text">${fav.text}</div>
                    <div class="favorite-meta">
                        <span>${fav.icon} ${fav.category}</span>
                        <span>${new Date(fav.created_at).toLocaleDateString()}</span>

            `).join('');
        }
        
        function showAffirmation(text, category, icon) {
            currentAffirmation = { text, category, icon };
            document.getElementById('affirmationText').textContent = text;
            document.getElementById('affirmationIcon').textContent = icon;
            document.getElementById('categoryText').textContent = category;
            updateFavoriteButton();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
        
        function shareAffirmation() {
            if (!currentAffirmation) return;
            
            const text = `✨ ${currentAffirmation.text}\n\n#DailyAffirmation #Recovery #Motivation`;
            
            if (navigator.share) {
                navigator.share({
                    title: 'Daily Affirmation',
                    text: text
                });
            } else {
                navigator.clipboard.writeText(text).then(() => {
                    alert('Affirmation copied to clipboard!');
                });
            }
        }
